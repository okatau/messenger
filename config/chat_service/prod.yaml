env: prod

http:
  port: 8082
  read_timeout: 10s
  write_timeout: 10s
  shutdown_timeout: 10s

auth:
  access_token_ttl: 30m

redis:
  addrs:
    - redis-prod:6379

origin_whitelist:
  - "http://localhost:8080"

limits:
  create_room: 5
  invite: 10
  messages: 30

friends_grpc_addr: "friends-prod:50051"