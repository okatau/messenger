events {
  worker_connections 1024;
}

http {
  upstream auth_service {
    server auth-prod:8081;
  }

  upstream chat_service {
    server chat-prod:8082;
  }

  upstream friends_service {
    server friends-prod:8083;
  }

  upstream frontend_service {
    server frontend-prod:3000;
  }

  # Internal port for server-side Next.js requests (API_INTERNAL_URL)
  server {
    listen 8080;

    location /api/v1/auth/ {
      proxy_pass http://auth_service/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/rooms/ {
      proxy_pass http://chat_service/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    location /api/v1/friends/ {
      proxy_pass http://friends_service/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }

  # External port for browser access
  server {
    listen 80;

    location /api/v1/auth/ {
      proxy_pass http://auth_service/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/rooms/ {
      proxy_pass http://chat_service/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    location /api/v1/friends/ {
      proxy_pass http://friends_service/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location / {
      proxy_pass http://frontend_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}
