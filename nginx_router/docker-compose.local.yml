services:

  nginx-local:
    container_name: nginx-local
    restart: always
    image: nginx:alpine
    user: "root"
    ports:
      - "8080:80"
    volumes:
      - ./nginx.local.conf:/etc/nginx/nginx.conf
    depends_on:
      - nodejs-local
      - auth-local
      - chat-local
      - friends-local

  nodejs-local:
    container_name: nodejs-local
    user: "root"
    restart: always
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args: {}
    volumes:
      - ../frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8080"
      NEXT_PUBLIC_WEBSOCKET_URL: "ws://localhost:8080/api/v1/rooms"
      API_INTERNAL_URL: "http://nginx-local"

  pg-local:
    container_name: pg-local
    user: "root"
    image: postgres:16-alpine
    restart: always
    environment: 
      POSTGRES_DB: "messenger"
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ".data/pg-local:/var/lib/postgresql/data"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d messenger"]
      interval: 5s
      timeout: 5s
      retries: 10
  
  # TODO move to makefile?
  migrate:
    image: postgres:16-alpine
    depends_on:
      pg-local:
        condition: service_healthy
    volumes:
      - ../migrations:/migrations
    environment: 
      PGPASSWORD: postgres
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        for f in $(ls /migrations/*.up.sql | sort); do
          echo "Applying $$f"                                                                                                                                                                                                                         
          psql -h pg-local -U postgres -d messenger -f $$f
        done    
  
  redis-local:
    container_name: redis-local
    user: "root"
    image: redis:8.6-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ".data/redis-local:/var/lib/redis/data"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
  
  auth-local:
    container_name: auth-local
    restart: always
    build:
      context: ../auth_service
      dockerfile: Dockerfile.local
    expose:
      - "8081"
    volumes:
      - ../config/auth_service:/etc/auth_service
      - ./.env.local:/etc/auth_service
    depends_on:
      migrate:
        condition: service_completed_successfully
  
  chat-local:
    container_name: chat-local
    restart: always
    build:
      context: ../chat_service
      dockerfile: Dockerfile.local
    expose:
      - "8082"
    volumes:
      - ../config/chat_service:/etc/chat_service
      - ./.env.local:/etc/chat_service
    depends_on:
      migrate:
        condition: service_completed_successfully
  
  friends-local:
    container_name: friends-local
    restart: always
    build:
      context: ../friends_service
      dockerfile: Dockerfile.local
    expose:
      - "8083"
    volumes:
      - ../config/friends_service:/etc/friends_service
      - ./.env.local:/etc/friends_service
    depends_on:
      migrate:
        condition: service_completed_successfully



