services:

  api-gateway-local:
    container_name: api-gateway-local
    restart: always
    build:
      context: ../api_gateway
      dockerfile: Dockerfile
    environment:
      APP_ENV_FILE: /etc/api_gateway/.env.local
      APP_CONFIG_FILE: /etc/api_gateway/local.yaml
    expose:
      - "7777"
    volumes:
      - ../config/api_gateway/local.yaml:/etc/api_gateway/local.yaml
      - ./.env.local:/etc/api_gateway/.env.local
    depends_on:
      redis-local:
        condition: service_healthy
      auth-local:
        condition: service_started
      chat-local:
        condition: service_started
      friends-local:
        condition: service_started

  nginx-local:
    container_name: nginx-local
    restart: always
    image: nginx:alpine
    user: "root"
    ports:
      - "8080:80"
    volumes:
      - ./nginx.local.conf:/etc/nginx/nginx.conf
    depends_on:
      - frontend-local
      - api-gateway-local
      - chat-local

  frontend-local:
    container_name: frontend-local
    restart: always
    build:
      context: ../frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8080"
      NEXT_PUBLIC_WEBSOCKET_URL: "ws://localhost:8080/api/v1/rooms"
      API_INTERNAL_URL: "http://nginx-local"
      NODE_ENV: production

  pg-local:
    container_name: pg-local
    user: "root"
    image: postgres:16-alpine
    restart: always
    environment: 
      POSTGRES_DB: "messenger"
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ".data/pg-local:/var/lib/postgresql/data"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d messenger"]
      interval: 5s
      timeout: 5s
      retries: 10
  
  # TODO move to makefile?
  migrate:
    image: postgres:16-alpine
    depends_on:
      pg-local:
        condition: service_healthy
    volumes:
      - ../migrations:/migrations
    environment: 
      PGPASSWORD: postgres
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        for f in $(ls /migrations/*.up.sql | sort); do
          echo "Applying $$f"                                                                                                                                                                                                                         
          psql -h pg-local -U postgres -d messenger -f $$f
        done    
  
  redis-local:
    container_name: redis-local
    user: "root"
    image: redis:8.6-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ".data/redis-local:/var/lib/redis/data"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
  
  auth-local:
    container_name: auth-local
    restart: always
    build:
      context: ../auth_service
      dockerfile: Dockerfile
    environment:            
      APP_ENV_FILE: /etc/auth_service/.env.local
      APP_CONFIG_FILE: /etc/auth_service/local.yaml
    expose:
      - "8081"
    # ports:
    #   - "8081:8081"
    # command: ["./server", "-env", "/etc/auth_service/.env.local", "-config", "/etc/auth_service/local.yaml"]
    volumes:
      - ../config/auth_service/local.yaml:/etc/auth_service/local.yaml
      - ./.env.local:/etc/auth_service/.env.local
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis-local:
        condition: service_healthy

  chat-local:
    container_name: chat-local
    restart: always
    build:
      context: ../chat_service
      dockerfile: Dockerfile
    environment:            
      APP_ENV_FILE: /etc/chat_service/.env.local
      APP_CONFIG_FILE: /etc/chat_service/local.yaml
    expose:
      - "8082"
    volumes:
      - ../config/chat_service/local.yaml:/etc/chat_service/local.yaml
      - ./.env.local:/etc/chat_service/.env.local
    depends_on:
      migrate:
        condition: service_completed_successfully
      friends-local:
        condition: service_started

  friends-local:
    container_name: friends-local
    restart: always
    build:
      context: ../friends_service
      dockerfile: Dockerfile
    environment:            
      APP_ENV_FILE: /etc/friends_service/.env.local
      APP_CONFIG_FILE: /etc/friends_service/local.yaml
    expose:
      - "8083"
      - "50051"
    volumes:
      - ../config/friends_service/local.yaml:/etc/friends_service/local.yaml
      - ./.env.local:/etc/friends_service/.env.local
    depends_on:
      migrate:
        condition: service_completed_successfully



