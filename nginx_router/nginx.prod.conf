events {
  worker_connections 1024;
}

http {
  upstream auth_service {
    server auth-prod:8081;
  }

  upstream chat_service {
    server chat-prod:8082;
  }

  upstream friends_service {
    server friends-prod:8083;
  }

  upstream frontend_service {
    server frontend-prod:3000;
  }

  # HTTP: только ACME-challenge, всё остальное → HTTPS
  server {
    listen 80;
    server_name ${DOMAIN};

    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # Внутренний порт для server-side запросов из Next.js (без редиректа)
  server {
    listen 8080;

    location /api/v1/auth/ {
      proxy_pass http://auth_service/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }

    location /api/v1/rooms/ {
      proxy_pass http://chat_service/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    location /api/v1/friends/ {
      proxy_pass http://friends_service/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
    }
  }

  # HTTPS: xray пробрасывает сюда через unix-сокет (proxy protocol v2)
  server {
    listen unix:/dev/shm/nginx.sock ssl proxy_protocol;
    server_name ${DOMAIN};

    set_real_ip_from unix:;
    real_ip_header proxy_protocol;

    ssl_certificate /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    location /api/v1/auth/ {
      proxy_pass http://auth_service/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/v1/rooms/ {
      proxy_pass http://chat_service/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }

    location /api/v1/friends/ {
      proxy_pass http://friends_service/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location / {
      proxy_pass http://frontend_service;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
    }
  }
}
