syntax = "proto3";

option go_package = "friends_service/proto";

service Friendship {
    rpc IsFriend (IsFriendRequest) returns (IsFriendResponse) {}
}

enum Status {
    FRIEND_REQUEST_UNSPECIFIED = 0;
    FRIEND_REQUEST_PENDING = 1;
    FRIEND_REQUEST_CANCELLED = 2;
    FRIEND_REQUEST_ACCEPTED = 3;
    FRIEND_REQUEST_REJECTED = 4;
}

message IsFriendResponse {
    bool status = 1;
}

message IsFriendRequest {
    string userId = 1;
    string  friendId = 2;
}