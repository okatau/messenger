services:
  nginx-local:
    containter_name: nginx-local
    restrart: always
    image: nginx:alpine
    user: "root"
    ports:
      - "80:80"
    volumes:
      - ./nginx-local.conf:/etc/nginx/nginx.conf
    depends_on:
      - nodejs-local
      - auth-local
      - chat-local
      - friends-local

  nodejs-local:
    container_name: nodejs-local
    user: "root"
    restart: always
    build:
      context: ../frontend
      dockerfile: Dockerfile.dev
      args: {}
    volumes:
      - ../frontend:/app
      - /app/node_modules
    environment:
      NEXT_PUBLIC_API_URL: "http://localhost:8080"
      NEXT_PUBLIC_WEBSOCKET_URL: "ws://localhost:8080/api/v1/rooms"

  pg-local:
    container_name: pg-local
    user: "root"
    image: postgres:16-alpine
    restart: always
    environment: 
      POSTGRES_DB: "messenger"
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - ".data/pg-local:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d messenger"]
      interval: 5s
      timeout: 5s
      retries: 10
  
  redis-local:
    container_name: redis-local
    user: "root"
    image: redis:8.6-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - ".data/redis-local:/var/lib/redis/data"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
  
  auth-local:
    container_name: auth-local
    build:
      context: ../auth_service
      dockerfile: Dockerfile
    expose:
      - "8081"
    environment:
      CONFIG_PATH: /chat-app/chats.env
    volumes:
      - ./chats.env:/chat-app/chats.env:ro
    depends_on:
      migrate:
        condition: service_completed_successfully



