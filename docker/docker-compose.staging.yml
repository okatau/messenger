services:

  nginx-prod:
    ports:
      - "8080:80"
    volumes:
      - ../config/nginx/nginx.staging.conf:/etc/nginx/nginx.conf:ro
    command: nginx -g 'daemon off;'
    environment:
      DOMAIN: ""
    depends_on:
      - frontend-prod
      - api-gateway-prod
      - chat-prod

  certbot:
    profiles: [disabled]
