services:
  nginx-prod:
    container_name: nginx-prod
    restart: always
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ../config/nginx/nginx.prod.conf:/etc/nginx/nginx.conf.template:ro
      - certbot-conf:/certdata:ro
      - certbot-www:/var/www/certbot:ro
      - /dev/shm:/dev/shm
    command: >
      /bin/sh -c "envsubst '$$DOMAIN' < /etc/nginx/nginx.conf.template
      > /etc/nginx/nginx.conf && nginx -g 'daemon off;'"
    environment:
      DOMAIN: "${DOMAIN}"
    depends_on:
      - frontend-prod
      - api-gateway-prod
      - chat-prod
    networks: [frontend]

  certbot:
    image: certbot/certbot
    volumes:
      - certbot-conf:/certdata
      - certbot-www:/certdata/www
    entrypoint:
      - /bin/sh
      - -c
      - "trap exit TERM; while :; do certbot renew --quiet --config-dir /certdata --work-dir /certdata/work --logs-dir /certdata/logs; sleep 12h & wait $${!}; done"

  frontend-prod:
    container_name: frontend-prod
    restart: always
    image: "${REGISTRY}/frontend:latest"
    expose:
      - "3000"
    environment:
      API_INTERNAL_URL: "http://nginx-prod:8080"
    networks: [frontend]

  pg-prod:
    container_name: pg-prod
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: ${PG_DBNAME}
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: "${PG_PASSWORD}"
    volumes:
      - pg-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER} -d ${PG_DBNAME}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [backend]

  redis-prod:
    container_name: redis-prod
    image: redis:8.6-alpine
    restart: always
    command: redis-server --requirepass "${REDIS_PASSWORD}"
    volumes:
      - redis-data:/var/lib/redis/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [backend]

  api-gateway-prod:
    container_name: api-gateway
    restart: always
    image: "${REGISTRY}/api-gateway:latest"
    environment:
      APP_ENV_FILE: /etc/api-gateway/.env.prod
      APP_CONFIG_FILE: /etc/api-gateway/prod.yaml
    expose:
      - "7777"
    volumes:
      - ../config/api_gateway/prod.yaml:/etc/api-gateway/prod.yaml
      - ../config/.env.prod:/etc/api-gateway/.env.prod
    depends_on:
      auth-prod:
        condition: service_started
      chat-prod:
        condition: service_started
      friends-prod:
        condition: service_started
      redis-prod:
        condition: service_healthy
    networks: [frontend, backend]

  auth-prod:
    container_name: auth-prod
    restart: always
    image: "${REGISTRY}/auth:latest"
    environment:
      APP_ENV_FILE: /etc/auth_service/.env.prod
      APP_CONFIG_FILE: /etc/auth_service/prod.yaml
    expose:
      - "8081"
    volumes:
      - ../config/auth_service/prod.yaml:/etc/auth_service/prod.yaml
      - ../config/.env.prod:/etc/auth_service/.env.prod
    depends_on:
      pg-prod:
        condition: service_healthy
      chat-prod:
        condition: service_started
    networks: [backend]

  chat-prod:
    container_name: chat-prod
    restart: always
    image: "${REGISTRY}/chat:latest"
    environment:
      APP_ENV_FILE: /etc/chat_service/.env.prod
      APP_CONFIG_FILE: /etc/chat_service/prod.yaml
    expose:
      - "8082"
    volumes:
      - ../config/chat_service/prod.yaml:/etc/chat_service/prod.yaml
      - ../config/.env.prod:/etc/chat_service/.env.prod
    depends_on:
      pg-prod:
        condition: service_healthy
      redis-prod:
        condition: service_healthy
      friends-prod:
        condition: service_started
    networks: [frontend, backend]

  friends-prod:
    container_name: friends-prod
    restart: always
    image: "${REGISTRY}/friends:latest"
    environment:
      APP_ENV_FILE: /etc/friends_service/.env.prod
      APP_CONFIG_FILE: /etc/friends_service/prod.yaml
    expose:
      - "8083"
      - "50051"
    volumes:
      - ../config/friends_service/prod.yaml:/etc/friends_service/prod.yaml
      - ../config/.env.prod:/etc/friends_service/.env.prod
    depends_on:
      pg-prod:
        condition: service_healthy
    networks: [backend]

volumes:
  pg-data:
  redis-data:
  certbot-conf:
  certbot-www:

networks:
  frontend:
  backend:
