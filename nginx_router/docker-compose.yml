services:
  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"        # снаружи :8080, внутри nginx слушает :80
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - auth
      - rooms
      - friends
      - frontend

  postgres:
    image: postgres:16-alpine
    environment: 
      POSTGRES_DB: "messenger"
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d messenger"]
      interval: 5s
      timeout: 5s
      retries: 10

  migrate:
    image: postgres:16-alpine
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ../migrations:/migrations
    environment: 
      PGPASSWORD: postgres
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        for f in $(ls /migrations/*.up.sql | sort); do
          echo "Applying $$f"                                                                                                                                                                                                                         
          psql -h postgres -U postgres -d messenger -f $$f
        done    
  
  redis:
    image: redis:8.6-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  auth:
    build:
      context: ../auth_service
      dockerfile: Dockerfile
    expose:
      - "8081"
    environment:
      CONFIG_PATH: /chat-app/chats.env
    volumes:
      - ./chats.env:/chat-app/chats.env:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
  
  rooms:
    build:
      context: ../chat_service
      dockerfile: Dockerfile
    expose:
      - "8082"
    environment:
      CONFIG_PATH: /chat-app/chats.env
    volumes:
      - ./chats.env:/chat-app/chats.env:ro
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy

  friends:
    build:
      context: ../friends_service
      dockerfile: Dockerfile
    expose:
      - "8083"
    environment:
      CONFIG_PATH: /chat-app/chats.env
    volumes:
      - ./chats.env:/chat-app/chats.env:ro
    depends_on:
      migrate:
        condition: service_completed_successfully

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: "http://localhost:8080"
        NEXT_PUBLIC_WEBSOCKET_URL: "ws://localhost:8080/api/v1/rooms"
    expose:
      - "3000"
    depends_on:
      - auth
      - rooms
      - friends

volumes:
  postgres_data:
  redis_data: